name: Release
on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write   # lets GITHUB_TOKEN create the Release
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # git-cliff needs full history + tags
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Build release notes from the Conventional Commit messages since the
      # previous tag (config in cliff.toml). Binary install works on Windows;
      # the official git-cliff-action is Docker-only and can't run here.
      - uses: taiki-e/install-action@v2
        with:
          tool: git-cliff
      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          git-cliff --latest --strip header -o NOTES.md
          {
            echo 'body<<GITCLIFF_EOF'
            cat NOTES.md
            echo GITCLIFF_EOF
          } >> "$GITHUB_OUTPUT"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing — set these repo secrets or the build fails (createUpdaterArtifacts is on).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Unity Log Viewer ${{ github.ref_name }}
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          prerelease: false

      # The bundler only uploads installers; also publish the raw self-contained
      # exe as a portable download (needs WebView2, which ships with Win 10/11).
      # Upload it under two names:
      #   - versioned: makes an archived copy self-identifying
      #   - version-less: a stable filename + URL
      #     (…/releases/latest/download/UnityLogViewer_x64_portable.exe) so
      #     portable users can overwrite in place, keeping the exe path — and
      #     thus their .log file association — unchanged across updates.
      - name: Add portable exe to the release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ver="${GITHUB_REF_NAME#v}"
          src="src-tauri/target/release/UnityLogViewer.exe"
          cp "$src" "UnityLogViewer_${ver}_x64_portable.exe"
          cp "$src" "UnityLogViewer_x64_portable.exe"
          gh release upload "$GITHUB_REF_NAME" \
            "UnityLogViewer_${ver}_x64_portable.exe" \
            "UnityLogViewer_x64_portable.exe" --clobber
