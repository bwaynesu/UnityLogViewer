name: Release
on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write   # lets GITHUB_TOKEN create the Release
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Unity Log Viewer ${{ github.ref_name }}
          releaseDraft: false
          prerelease: false

      # The bundler only uploads installers; also publish the raw self-contained
      # exe as a portable download (needs WebView2, which ships with Win 10/11).
      - name: Add portable exe to the release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ver="${GITHUB_REF_NAME#v}"
          cp "src-tauri/target/release/UnityLogViewer.exe" "UnityLogViewer_${ver}_x64_portable.exe"
          gh release upload "$GITHUB_REF_NAME" "UnityLogViewer_${ver}_x64_portable.exe" --clobber
